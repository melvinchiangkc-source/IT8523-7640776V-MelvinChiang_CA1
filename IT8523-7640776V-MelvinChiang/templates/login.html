<!-- login.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <!-- Use the same stylesheet for navbar + theme -->
  <link rel="stylesheet" href="../static/css/default.css">
  <!-- Add login-specific styles -->
  <link rel="stylesheet" href="../static/css/login_styles.css">
</head>
<body>
  <!-- Shared Nav Bar -->
  <nav class="navbar">
  <!-- Logo + Title combined into one clickable link -->
  <a href="../templates/TT_index.html" class="logo-link">
    <div class="header-with-icon">
      <img src="../static/favicon.ico" alt="Task Tracker Icon">
      <h2>Task Tracker</h2>
    </div>
  </a>

  <div class="nav-links">
    <a href="/create">Create Task</a>
    <a href="/view">View Tasks</a>
    <a href="/features">Features</a>
    <a href="/testimonial">Testimonial</a>
    <a href="/pricing">Pricing</a>
  </div>

  <div class="auth-links">
    <a href="../templates/register.html" class="btn">Sign Up</a> 
  </div>
</nav>


  <!-- Login Form -->
  <div class="form-container">
    <h2>Login</h2>
    <form id="loginForm">
      <div>
        <label for="email">Email:</label>
        <input type="email" id="email" required />
      </div>
      <div>
        <label for="password">Password:</label>
        <input type="password" id="password" required />
      </div>
      <div class="forgot-password">
      <a href="../templates/update.html">Forgot Password?</a>
      </div>

      <button type="submit">Login</button>
    </form>
  </div>

  <script src="{{ url_for('static', filename='js/common.js') }}" defer></script>
  <script src="{{ url_for('static', filename='js/login.js') }}" defer></script>
</body>
</html>
