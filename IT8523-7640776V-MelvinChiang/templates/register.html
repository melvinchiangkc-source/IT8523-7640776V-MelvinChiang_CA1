<!-- register.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Use the same stylesheet for navbar + theme -->
    <link rel="stylesheet" href="../static/css/default.css">
    <!-- Add register-specific styles -->
    <link rel="stylesheet" href="../static/css/register_styles.css">
    <title>Register User</title>
  </head>
<body>
    <!-- Shared Nav Bar -->
  <nav class="navbar">
  <!-- Logo + Title combined into one clickable link -->
  <a href="../templates/TT_index.html" class="logo-link">
    <div class="header-with-icon">
      <img src="../static/favicon.ico" alt="Task Tracker Icon">
      <h2>Task Tracker</h2>
    </div>
  </a>

  <div class="nav-links">
    <a href="/create">Create Task</a>
    <a href="/view">View Tasks</a>
    <a href="/features">Features</a>
    <a href="/testimonial">Testimonial</a>
    <a href="/pricing">Pricing</a>
  </div>

  <div class="auth-links">
    <a href="/register.html" class="btn">Sign Up</a>
  </div>
</nav>
    <h2>Register</h2>
    <form id="registerForm">
      <div>
        <label for="name">Name:</label>
        <input type="text" id="name" required />
      </div>
      <div>
        <label for="email">Email:</label>
        <input type="email" id="email" required />
      </div>
      <div>
        <label for="password">Password:</label>
        <input type="password" id="password" required />
      </div>
      <div>
        <label for="url">URL:</label>
        <input type="url" id="url" required />
      </div>
      <button type="submit">Register</button>
    </form>
    <!-- Add common.js here -->
    <script
      src="{{ url_for('static', filename='js/common.js') }}"
      defer
    ></script>
    <script
      src="{{ url_for('static', filename='js/register.js') }}"
      defer
    ></script>
</body>
</html>
